<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Coach Memory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="memory.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased" x-data="memoryApp()" x-init="init()">
    <div class="max-w-3xl mx-auto px-8 py-6">
        <header class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800">🧠 Coach Memory</h1>
            <div class="flex items-center gap-2">
                <a href="chat-history.html" class="px-3 py-2 bg-white border rounded shadow-sm hover:bg-gray-50 text-sm">🗂️ Chats</a>
                <a href="index.html" class="px-3 py-2 bg-white border rounded shadow-sm hover:bg-gray-50 text-sm">Back to Training OS</a>
            </div>
        </header>

        <p class="text-sm text-gray-500 mb-6">Facts the coach has learned and will recall in every conversation. The coach updates this autonomously; you can also add, edit, or delete items here.</p>

        <!-- Add / edit form -->
        <div class="bg-white border rounded-lg p-4 mb-6 shadow-sm">
            <h2 class="text-sm font-semibold text-gray-700 mb-3" x-text="editingKey ? `Editing: ${editingKey}` : 'Add a memory item'"></h2>
            <div class="flex gap-2 mb-2">
                <input
                    x-model="formKey"
                    :disabled="!!editingKey"
                    type="text"
                    placeholder="key (e.g. goal)"
                    class="flex-1 border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 disabled:bg-gray-100"
                    @keydown.enter="saveItem()"
                />
                <input
                    x-model="formValue"
                    type="text"
                    placeholder="value"
                    class="flex-[3] border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
                    @keydown.enter="saveItem()"
                />
                <button @click="saveItem()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">Save</button>
                <button x-show="editingKey" @click="cancelEdit()" class="px-3 py-2 bg-white border rounded hover:bg-gray-50 text-sm">Cancel</button>
            </div>
            <p x-show="error" x-text="error" class="text-red-500 text-xs mt-1"></p>
        </div>

        <!-- Memory table -->
        <div class="bg-white border rounded-lg shadow-sm overflow-hidden">
            <template x-if="items.length === 0">
                <p class="text-gray-400 text-sm text-center py-10">No memory items yet. The coach will add them as it learns about you.</p>
            </template>
            <template x-if="items.length > 0">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="text-left px-4 py-3 text-gray-600 font-medium w-1/4">Key</th>
                            <th class="text-left px-4 py-3 text-gray-600 font-medium">Value</th>
                            <th class="text-left px-4 py-3 text-gray-600 font-medium w-16">Source</th>
                            <th class="px-4 py-3 w-24"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="item in items" :key="item.id">
                            <tr class="border-b last:border-0 hover:bg-gray-50">
                                <td class="px-4 py-3 font-mono text-xs text-gray-700" x-text="item.key"></td>
                                <td class="px-4 py-3 text-gray-800" x-text="item.value"></td>
                                <td class="px-4 py-3">
                                    <span
                                        class="px-2 py-0.5 rounded text-xs font-medium"
                                        :class="item.source === 'coach' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600'"
                                        x-text="item.source"
                                    ></span>
                                </td>
                                <td class="px-4 py-3 flex gap-2 justify-end">
                                    <button @click="startEdit(item)" class="text-xs px-2 py-1 border rounded hover:bg-gray-50 text-gray-600">Edit</button>
                                    <button @click="deleteItem(item.id)" class="text-xs px-2 py-1 border rounded hover:bg-red-50 text-red-600">Delete</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>
        </div>
    </div>
</body>
</html>
