<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Training OS - Training Load</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
  <div class="max-w-screen-2xl mx-auto px-6 py-6">
    <header class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800">📊 Training Load</h1>
      <div class="flex items-center gap-2">
        <a href="analysis.html" class="px-3 py-1 bg-white border rounded shadow-sm hover:bg-gray-50">📈 Trends</a>
        <a href="index.html" class="px-3 py-1 bg-white border rounded shadow-sm hover:bg-gray-50">← Back to Calendar</a>
      </div>
    </header>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-3 mb-4 flex items-end gap-3">
      <div>
        <label class="block text-xs text-gray-600 mb-1">End date</label>
        <input id="end-date" type="date" class="px-2 py-2 bg-white border rounded shadow-sm text-sm">
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">Window</label>
        <select id="lookback-days" class="px-2 py-2 bg-white border rounded shadow-sm text-sm">
          <option value="14" selected>14 days</option>
          <option value="21">21 days</option>
          <option value="28">28 days</option>
          <option value="42">42 days</option>
        </select>
      </div>
      <button id="refresh-btn" class="px-4 py-2 bg-white border rounded-full shadow-sm hover:bg-gray-50 text-sm font-medium">Refresh</button>
      <div id="summary" class="ml-auto text-sm text-gray-700"></div>
    </div>

    <div class="space-y-4">
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-3"><canvas id="chart-daily-load" height="120"></canvas></div>
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-3"><canvas id="chart-trend-stress" height="120"></canvas></div>
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-3"><canvas id="chart-shape-daily" height="120"></canvas></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="training-load.js"></script>
</body>
</html>
